name: Daily BD Outreach
on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
      - run: echo '${{ secrets.GOOGLE_TOKEN_PICKLE_B64 }}' | base64 -d > token.pickle
      - run: python send_outreach_emails.py
